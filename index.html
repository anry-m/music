<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Release | Singularity</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/icons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="assets/icons/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="assets/icons/apple-touch-icon.png" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__bg" aria-hidden="true"></div>
      <div class="hero__content">
        <div class="hero__album-wrap">
          <div class="album-card" id="album-card">
            <img
              src="assets/cover.jpg"
              alt="Album cover for Singularity"
              loading="lazy"
            />
          </div>
          <div class="hero__actions">
            <button class="hero-btn" id="share-hero">
              <span class="hero-btn__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <circle cx="7" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                  <circle cx="17" cy="7" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                  <circle cx="17" cy="17" r="3" fill="none" stroke="currentColor" stroke-width="2" />
                  <path d="M9.8 10.7l4.3-2.4M9.8 13.3l4.3 2.4" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                </svg>
              </span>
              Share
            </button>
          </div>
        </div>
      </div>
    </header>

    <main>
      <section class="release-grid">
        <div class="release">
          <h1 class="release__title">Singularity</h1>
          <p class="release__byline">
            by <a class="release__artist" href="#">Andrey Marchenko</a>
          </p>
          <div class="release__get">My music:</div>
          <div class="streaming">
            <a class="service" href="https://open.spotify.com/artist/0LfB6IuJPueA7Qso9vyZhi" target="_blank" rel="noopener">
              <span class="service__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                  <path d="M7 10.2c3.5-1 6.8-.6 10 .9" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" />
                  <path d="M7.6 13.1c2.9-.7 5.4-.4 8 .7" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                  <path d="M8.2 15.7c2-.4 3.9-.2 5.6.6" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" />
                </svg>
              </span>
              Spotify
            </a>
            <a class="service service--apple" href="https://music.apple.com/ru/album/resurrection-single/1794650855" target="_blank" rel="noopener">
              <span class="service__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <path d="M15.6 5.3c.6-.7 1-1.7.9-2.7-.9.1-1.9.6-2.5 1.3-.6.6-1.1 1.7-.9 2.6 1 .1 1.9-.5 2.5-1.2z" fill="currentColor" />
                  <path d="M19.1 12.3c0-2.1 1.7-3.1 1.8-3.1-1-1.5-2.6-1.7-3.1-1.7-1.3-.1-2.5.8-3.2.8-.7 0-1.7-.8-2.8-.7-1.4 0-2.7.8-3.4 2.1-1.5 2.6-.4 6.3 1.1 8.3.7 1 1.6 2.1 2.7 2.1 1.1 0 1.5-.7 2.8-.7 1.3 0 1.7.7 2.8.6 1.1 0 1.9-1 2.6-2 .8-1.1 1.1-2.3 1.1-2.3-.1 0-2.4-.9-2.4-3.4z" fill="currentColor" />
                </svg>
              </span>
              Apple Music
            </a>
            <a class="service" href="https://music.youtube.com/channel/UCHMFA-yWKU_y0UVYFW31_hw" target="_blank" rel="noopener">
              <span class="service__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <circle cx="12" cy="12" r="10" fill="none" stroke="currentColor" stroke-width="2" />
                  <polygon points="10,8 17,12 10,16" fill="currentColor" />
                </svg>
              </span>
              YouTube
            </a>
            <a class="service" href="https://www.deezer.com/us/album/709200591" target="_blank" rel="noopener">
              <span class="service__icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" role="img" aria-hidden="true">
                  <rect x="5" y="7" width="3" height="3" fill="currentColor" />
                  <rect x="9" y="7" width="3" height="3" fill="currentColor" />
                  <rect x="13" y="7" width="6" height="3" fill="currentColor" />
                  <rect x="5" y="11" width="3" height="3" fill="currentColor" />
                  <rect x="9" y="11" width="6" height="3" fill="currentColor" />
                  <rect x="5" y="15" width="6" height="3" fill="currentColor" />
                </svg>
              </span>
              Deezer
            </a>
          </div>
        </div>

        <section class="tracklist" aria-label="Tracklist">
          <div class="track" data-track="assets/audio/Singularity_clip.mp3" data-title="Singularity" data-artist="Andrey Marchenko">
            <button class="track__play" aria-label="Play Singularity">
              ▶
            </button>
            <div class="track__meta">
              <div class="track__title">Singularity <span class="track__clip">[clip]</span></div>
              <div class="track__artist">Andrey Marchenko</div>
            </div>
            <div class="track__time">3:15</div>
          </div>
          <div class="track" data-track="assets/audio/Synthetic_Collapse_clip.mp3" data-title="Synthetic Collapse" data-artist="Andrey Marchenko">
            <button class="track__play" aria-label="Play Synthetic Collapse">
              ▶
            </button>
            <div class="track__meta">
              <div class="track__title">Synthetic Collapse <span class="track__clip">[clip]</span></div>
              <div class="track__artist">Andrey Marchenko</div>
            </div>
            <div class="track__time">3:52</div>
          </div>
          <div class="track" data-track="assets/audio/A_New_Beginning_clip.mp3" data-title="A New Beginning" data-artist="Andrey Marchenko">
            <button class="track__play" aria-label="Play A New Beginning">
              ▶
            </button>
            <div class="track__meta">
              <div class="track__title">A New Beginning <span class="track__clip">[clip]</span></div>
              <div class="track__artist">Andrey Marchenko</div>
            </div>
            <div class="track__time">4:08</div>
          </div>
        </section>
      </section>

    </main>

    <div class="player" id="player">
      <div class="player__info">
        <div class="player__title" id="player-title">Select a track</div>
        <div class="player__artist" id="player-artist">Andrey Marchenko</div>
      </div>
      <div class="player__controls">
        <div class="player__scrub">
          <input
            class="player__range"
            id="player-range"
            type="range"
            min="0"
            max="100"
            value="0"
            step="0.1"
            aria-label="Track position"
          />
        </div>
        <button class="player__button" id="player-toggle" aria-label="Play or pause">
          ▶
        </button>
        <span class="player__time" id="player-time">0:00</span>
      </div>
      <audio id="audio" preload="none"></audio>
    </div>

    <script src="script.js"></script>
  </body>
</html>
